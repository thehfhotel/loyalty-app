# Cargo configuration for the Rust backend

[build]
# Use all available CPU cores for parallel compilation
jobs = -1

# Enable incremental compilation for faster rebuilds
incremental = true

[profile.dev]
# Development profile settings
incremental = true
# Faster debug builds with some optimizations
opt-level = 0
debug = true

[profile.release]
# Release profile with link-time optimization
lto = "thin"
# Single codegen unit for better optimization
codegen-units = 1
# Strip debug symbols for smaller binary
strip = "symbols"
# Enable optimizations
opt-level = 3
# Panic behavior
panic = "abort"

[profile.dev.package."*"]
# Optimize dependencies even in dev mode for faster runtime
opt-level = 2

[target.x86_64-unknown-linux-gnu]
# Use the mold linker (https://github.com/rui314/mold) for substantially
# faster linking on Linux x86_64. CI installs mold + clang in the
# rust:1.93-bookworm container before invoking cargo; local Linux dev
# machines benefit too if mold is on PATH. macOS dev is untouched because
# this stanza only applies to the linux-gnu target.
#
# Note: target-cpu=native is intentionally NOT set here because it causes
# SIGILL in CI when sccache serves cached objects compiled with different
# CPU features. For local performance, run:
#   RUSTFLAGS="-C target-cpu=native" cargo build
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.x86_64-unknown-linux-musl]
# MUSL target for static binaries (Alpine Linux)
rustflags = ["-C", "target-feature=-crt-static"]

[env]
# Environment variables for builds
SQLX_OFFLINE = "true"  # Use pre-cached .sqlx/ query metadata for compilation without a live DB

[alias]
# Useful command aliases
b = "build"
c = "check"
t = "test"
r = "run"
br = "build --release"
rr = "run --release"
