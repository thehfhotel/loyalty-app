name: CI Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: 'Skip E2E tests'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  packages: write
  # Needed by the verify-staging-on-failure job below so a red staging
  # deploy surfaces as a GitHub issue, not just a tab nobody opens.
  issues: write

env:
  NODE_VERSION: '24'
  RUST_VERSION: '1.93'
  REGISTRY: ghcr.io
  IMAGE_OWNER: thehfhotel
  IMAGE_REPO: loyalty-app
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # =============================================================================
  # LINT BACKEND (Rust) - fail-fast fmt + clippy on bare ubuntu, separate cache
  # =============================================================================

  lint-backend:
    name: "Lint Backend (Rust)"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust dependencies (lint)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend-rust -> target"
          cache-on-failure: true
          prefix-key: "v0-rust-lint"

      - name: Check formatting
        working-directory: ./backend-rust
        run: cargo fmt --all -- --check

      - name: Run clippy (lints)
        working-directory: ./backend-rust
        run: cargo clippy --all-targets --all-features -- -D warnings

  # =============================================================================
  # BACKEND TESTS (Rust) — split into two parallel jobs
  #
  # `test-backend-unit` runs the DB-free unit/bin tests on bare ubuntu with a
  # dedicated rust-cache prefix. It typically finishes in <1m, well under the
  # release build, so it stays off the critical path entirely.
  #
  # `test-backend-integration` keeps the rust:1.93-bookworm container plus
  # Postgres + Redis services and runs only the integration suite
  # (`cargo nextest run --test '*'`). It shares the `v0-rust-container` cache
  # prefix with `build-backend-release`, so both jobs reuse the same `target/`
  # artifacts — which is also why the unit job can't share that prefix: native
  # ubuntu glibc and the bookworm container produce incompatible `target/`
  # layouts.
  #
  # `e2e-tests` and `deploy-staging` gate on BOTH test jobs so we never burn
  # e2e/deploy time on a red backend.
  # =============================================================================

  test-backend-unit:
    name: "Test Backend Unit (Rust)"
    runs-on: ubuntu-latest
    needs: [lint-backend]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust dependencies (unit)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend-rust -> target"
          cache-on-failure: true
          # Separate prefix from `v0-rust-container`: this job runs on bare
          # ubuntu (glibc 2.39) while integration + release builds run inside
          # rust:1.93-bookworm (glibc 2.36). Sharing the cache between them
          # would surface as link-time / runtime ABI failures.
          prefix-key: "v0-rust-unit"

      - name: Cache cargo-nextest
        id: cache-nextest
        uses: actions/cache@v5
        with:
          # `taiki-e/install-action@nextest` installs a single binary;
          # `cargo nextest ...` is dispatched through `cargo-nextest`.
          # On bare ubuntu, dtolnay/rust-toolchain installs cargo under
          # ~/.cargo, so cargo-installed binaries land there too.
          path: ~/.cargo/bin/cargo-nextest
          key: cargo-nextest-${{ env.RUST_VERSION }}-${{ runner.os }}-native

      - name: Install cargo-nextest
        if: steps.cache-nextest.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@nextest

      - name: Run unit tests
        working-directory: ./backend-rust
        run: cargo nextest run --lib --bins
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  test-backend-integration:
    name: "Test Backend Integration (Rust)"
    runs-on: ubuntu-latest
    needs: [lint-backend]
    timeout-minutes: 30
    container:
      image: rust:1.93-bookworm

    defaults:
      run:
        shell: bash

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: loyalty_test
          POSTGRES_PASSWORD: loyalty_test_pass
          POSTGRES_DB: loyalty_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://loyalty_test:loyalty_test_pass@postgres:5432/loyalty_test_db
      TEST_DATABASE_URL: postgresql://loyalty_test:loyalty_test_pass@postgres:5432/loyalty_test_db
      TEST_REDIS_URL: redis://redis:6379
      PGPASSWORD: loyalty_test_pass

    steps:
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libpq-dev postgresql-client

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend-rust -> target"
          cache-on-failure: true
          prefix-key: "v0-rust-container"

      - name: Cache cargo-nextest
        id: cache-nextest
        uses: actions/cache@v5
        with:
          # In the rust:1.93-bookworm container, cargo lives at
          # /usr/local/cargo, so cargo-installed binaries land in
          # /usr/local/cargo/bin. Distinct key from the unit-job cache
          # because the container glibc (2.36) differs from native
          # ubuntu (2.39) and the binary is glibc-linked.
          path: /usr/local/cargo/bin/cargo-nextest
          key: cargo-nextest-${{ env.RUST_VERSION }}-${{ runner.os }}-container

      - name: Install cargo-nextest
        if: steps.cache-nextest.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@nextest

      - name: Grant CREATEDB for per-test database isolation
        run: |
          psql -h postgres -p 5432 -U loyalty_test -d loyalty_test_db \
            -c "ALTER USER loyalty_test CREATEDB;"

      - name: Run database migrations
        run: |
          set -euo pipefail
          for f in backend-rust/migrations/*.sql; do
            echo "Applying $f"
            psql -h postgres -p 5432 -U loyalty_test -d loyalty_test_db \
              -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Verify database schema
        run: |
          TABLE_COUNT=$(psql -h postgres -p 5432 -U loyalty_test -d loyalty_test_db -t -c \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_type = 'BASE TABLE';")
          TABLE_COUNT=$(echo "$TABLE_COUNT" | tr -d ' ')
          echo "Tables created: $TABLE_COUNT"
          if [ "$TABLE_COUNT" -lt 25 ]; then
            echo "::error::Expected 25+ tables, found $TABLE_COUNT. Migration may have failed."
            psql -h postgres -p 5432 -U loyalty_test -d loyalty_test_db -c \
              "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public' AND table_type = 'BASE TABLE' ORDER BY table_name;"
            exit 1
          fi

          FUNC_COUNT=$(psql -h postgres -p 5432 -U loyalty_test -d loyalty_test_db -t -c \
            "SELECT count(*) FROM information_schema.routines WHERE routine_schema = 'public' AND routine_type = 'FUNCTION';")
          FUNC_COUNT=$(echo "$FUNC_COUNT" | tr -d ' ')
          echo "Stored procedures/functions: $FUNC_COUNT"
          if [ "$FUNC_COUNT" -lt 5 ]; then
            echo "::error::Expected 5+ stored procedures, found $FUNC_COUNT."
            exit 1
          fi

          echo "Database schema verification passed"

      - name: Seed test data
        run: |
          psql -h postgres -p 5432 -U loyalty_test -d loyalty_test_db -c "
            INSERT INTO tiers (name, min_points, min_nights, benefits, color, sort_order, is_active)
            VALUES
              ('Bronze', 0, 0, '{\"discount\": 0}', '#CD7F32', 1, true),
              ('Silver', 0, 1, '{\"discount\": 5}', '#C0C0C0', 2, true),
              ('Gold', 0, 10, '{\"discount\": 10}', '#FFD700', 3, true),
              ('Platinum', 0, 20, '{\"discount\": 15}', '#E5E4E2', 4, true)
            ON CONFLICT (name) DO NOTHING;

            INSERT INTO membership_id_sequence (id, current_user_count)
            VALUES (1, 0)
            ON CONFLICT (id) DO NOTHING;
          "
          echo "Test data seeded successfully"

      - name: Cache sqlx-cli
        id: cache-sqlx
        uses: actions/cache@v5
        with:
          # sqlx-cli installs TWO binaries; `cargo sqlx ...` invocations
          # below need `cargo-sqlx` in PATH. Caching only `sqlx` (as a prior
          # version of this step did) silently produced cache hits that
          # restored only half the install — the next run then failed with
          # "no such command: `sqlx`".
          path: |
            /usr/local/cargo/bin/sqlx
            /usr/local/cargo/bin/cargo-sqlx
          key: sqlx-cli-container-${{ env.RUST_VERSION }}-v2

      - name: Install sqlx-cli
        if: steps.cache-sqlx.outputs.cache-hit != 'true'
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Verify SQLx query cache
        working-directory: ./backend-rust
        run: cargo sqlx prepare --check

      - name: Run integration tests
        working-directory: ./backend-rust
        run: cargo nextest run --test '*'
        env:
          RUST_BACKTRACE: short
          RUST_LOG: warn
          JWT_SECRET: test-jwt-secret-key-for-testing-only-minimum-32-chars
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-testing-only-minimum-32-chars
          SESSION_SECRET: test-session-secret-key-for-testing-only-minimum-32-chars
          GOOGLE_CLIENT_ID: test-google-client-id
          GOOGLE_CLIENT_SECRET: test-google-client-secret
          GOOGLE_CALLBACK_URL: http://localhost:4001/api/oauth/google/callback
          LINE_CLIENT_ID: test-line-channel-id
          LINE_CLIENT_SECRET: test-line-channel-secret
          LINE_CALLBACK_URL: http://localhost:4001/api/oauth/line/callback
          FRONTEND_URL: http://localhost:3000

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  build-backend-release:
    name: "Build Backend Release"
    runs-on: ubuntu-latest
    needs: [lint-backend]
    timeout-minutes: 25
    container:
      image: rust:1.93-bookworm

    defaults:
      run:
        shell: bash

    steps:
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libpq-dev

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend-rust -> target"
          cache-on-failure: true
          prefix-key: "v0-rust-container"

      - name: Build release binary
        working-directory: ./backend-rust
        run: cargo build --release --bin loyalty-backend

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: loyalty-backend-binary
          path: backend-rust/target/release/loyalty-backend
          retention-days: 1

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  # =============================================================================
  # BUILD AND PUSH DOCKER IMAGES TO GHCR
  # =============================================================================

  build-and-push:
    name: "Build & Push to GHCR"
    runs-on: ubuntu-latest
    # Only the binary artifact is required; release build runs in parallel
    # with the two test-backend jobs, so build-and-push can start as soon
    # as the binary is ready without waiting for the test suite.
    needs: [build-backend-release]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      image-tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------------------------
      # Backend Image (Rust) - uses pre-built binary from build-backend-release
      # -------------------------------------------------------------------------
      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: loyalty-backend-binary
          path: ./backend-binary

      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/backend
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend-binary
          file: ./backend-rust/Dockerfile.ci
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend-ci
          cache-to: type=gha,mode=max,scope=backend-ci
          platforms: linux/amd64

      # -------------------------------------------------------------------------
      # Frontend Image
      # -------------------------------------------------------------------------
      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/frontend
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'https://loyalty.saichon.com/api' }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          platforms: linux/amd64

      - name: Summary
        run: |
          echo "## Docker Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backend (Rust)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta-backend.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Frontend" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta-frontend.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # E2E TESTS (using GHCR images)
  # =============================================================================

  e2e-tests:
    name: "E2E Tests"
    runs-on: ubuntu-latest
    # Wait for both backend test jobs so we don't burn 2+ minutes of e2e
    # runtime against a backend whose unit or integration tests are red.
    needs: [build-and-push, test-backend-unit, test-backend-integration]
    if: github.event.inputs.skip_e2e != 'true'
    timeout-minutes: 20
    # E2E tests run sequentially to prevent port conflicts
    concurrency:
      group: e2e-tests
      cancel-in-progress: false

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: loyalty_e2e
          POSTGRES_PASSWORD: loyalty_e2e_pass
          POSTGRES_DB: loyalty_e2e_db
        ports:
          - 5436:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          # Read the resolved version from package-lock.json (semver-pinned),
          # not the ^-prefixed range in package.json, so the cache key changes
          # only when the lockfile changes.
          PLAYWRIGHT_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "version=$PLAYWRIGHT_VERSION" >> $GITHUB_OUTPUT
          echo "Playwright version: $PLAYWRIGHT_VERSION"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers (with system deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cache hit, browsers already present)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull backend image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/backend:${{ github.sha }}

      - name: Pull frontend image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/frontend:${{ github.sha }}

      - name: Start backend container
        run: |
          docker run -d --name backend --network host \
            -e RUST_ENV=development \
            -e NODE_ENV=development \
            -e PORT=4202 \
            -e DATABASE_URL=postgresql://loyalty_e2e:loyalty_e2e_pass@localhost:5436/loyalty_e2e_db \
            -e REDIS_URL=redis://localhost:6381 \
            -e JWT_SECRET=e2e-jwt-secret-for-testing-minimum-64-characters-long-secure-token-string \
            -e JWT_REFRESH_SECRET=e2e-jwt-refresh-secret-for-testing-minimum-64-characters-long-string \
            -e SESSION_SECRET=e2e-session-secret-for-testing-minimum-64-characters-long-secure-string \
            -e GOOGLE_CLIENT_ID=e2e-google-client-id \
            -e GOOGLE_CLIENT_SECRET=e2e-google-client-secret \
            -e GOOGLE_CALLBACK_URL=http://localhost:4202/api/oauth/google/callback \
            -e LINE_CLIENT_ID=e2e-line-channel-id \
            -e LINE_CLIENT_SECRET=e2e-line-channel-secret \
            -e LINE_CALLBACK_URL=http://localhost:4202/api/oauth/line/callback \
            -e FRONTEND_URL=http://localhost:3201 \
            -e RUST_LOG=info \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/backend:${{ github.sha }}

      - name: Start frontend container
        run: |
          docker run -d --name frontend \
            --add-host=host.docker.internal:host-gateway \
            -v ${{ github.workspace }}/frontend/nginx.e2e.conf:/etc/nginx/nginx.conf:ro \
            -p 3201:80 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/frontend:${{ github.sha }}

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -sf http://localhost:4202/api/health > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Backend failed to start"
              docker logs backend
              exit 1
            fi
            sleep 2
          done

          echo "Waiting for frontend..."
          for i in {1..30}; do
            if curl -sf http://localhost:3201 > /dev/null 2>&1; then
              echo "Frontend is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Frontend failed to start"
              docker logs frontend
              exit 1
            fi
            sleep 2
          done

      - name: Seed E2E test users
        run: |
          echo "Creating E2E test users..."
          # Create test user 1
          curl -sf -X POST http://localhost:4202/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"e2e-browser@test.com","password":"E2ETestPassword123!","firstName":"E2E","lastName":"Browser"}' \
            && echo "Created e2e-browser@test.com" \
            || echo "User may already exist"

          # Create test user 2
          curl -sf -X POST http://localhost:4202/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"e2e-browser-2@test.com","password":"E2ETestPassword123!","firstName":"E2E","lastName":"Browser2"}' \
            && echo "Created e2e-browser-2@test.com" \
            || echo "User may already exist"

          # Create admin test user (email is in admins.e2e.json)
          curl -sf -X POST http://localhost:4202/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"e2e-admin@test.local","password":"AdminPassword123!","firstName":"E2E","lastName":"Admin"}' \
            && echo "Created e2e-admin@test.local" \
            || echo "User may already exist"

          echo "E2E test users seeded"

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:3201
          E2E_API_URL: http://localhost:4202/api

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Cleanup containers
        if: always()
        run: |
          docker stop backend frontend 2>/dev/null || true
          docker rm backend frontend 2>/dev/null || true

  # =============================================================================
  # WAIT FOR CI Tests WORKFLOW (frontend jobs) BEFORE STAGING DEPLOY
  #
  # ci-test.yml runs the frontend lint and unit-test jobs for the same commit.
  # We poll the gh API instead of using workflow_run (which adds 30-120s of
  # orchestration latency and has a documented "skipped" race when two
  # upstream workflows complete out of order).
  # =============================================================================

  wait-for-frontend-checks:
    name: "Wait for Frontend Checks"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15

    steps:
      - name: Poll ci-test.yml for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Polling ci-test.yml for commit $COMMIT_SHA"

          # Poll for up to ~12 minutes (72 attempts x 10s). Fail closed if the
          # frontend checks haven't succeeded by then.
          for attempt in $(seq 1 72); do
            CONCLUSION=$(gh run list -R ${{ github.repository }} \
              --workflow=ci-test.yml --branch=main --commit="$COMMIT_SHA" \
              --json conclusion,status --jq '.[0] | "\(.status):\(.conclusion // "pending")"')

            echo "Attempt $attempt: ci-test.yml = ${CONCLUSION:-no-run-yet}"

            case "$CONCLUSION" in
              completed:success)
                echo "ci-test.yml completed successfully"
                exit 0
                ;;
              completed:failure|completed:cancelled|completed:timed_out|completed:action_required|completed:startup_failure)
                echo "::error::ci-test.yml did not succeed (status=$CONCLUSION) — aborting staging deploy"
                exit 1
                ;;
              *)
                sleep 10
                ;;
            esac
          done

          echo "::error::Timed out waiting for ci-test.yml to complete for $COMMIT_SHA"
          exit 1

  # =============================================================================
  # DEPLOY TO STAGING (no approval needed)
  #
  # Inlined here so the deploy starts the moment its prerequisites are green,
  # instead of going through a workflow_run hop that adds 30-120s of latency
  # and can race itself into "skipped" purgatory when two upstream workflows
  # finish in the wrong order.
  #
  # E2E intentionally NOT in `needs:` — every PR runs full E2E before merge
  # (the meaningful gate), production deploys require manual human approval,
  # and `verify-staging` below catches deploy-itself-broken cases. On main,
  # E2E still runs in parallel: a red E2E fails the overall workflow status
  # and surfaces in the GitHub Environments panel before a human approves
  # prod.
  # =============================================================================

  deploy-staging:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    needs: [test-backend-unit, test-backend-integration, build-and-push, wait-for-frontend-checks]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10
    environment:
      name: development
      url: http://loyalty-dev.saichon.com

    steps:
      - name: Checkout config files
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.yml
            docker-compose.ghcr.yml
            docker-compose.staging.yml
            nginx/nginx.conf
          sparse-checkout-cone-mode: false

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /tmp/cloudflared
          sudo install -m 755 /tmp/cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Install SSH key + known_hosts
        env:
          SSH_KEY:  ${{ secrets.EVERGREEN_DEPLOY_SSH_KEY }}
          HOST_KEY: ${{ secrets.EVERGREEN_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY"  > ~/.ssh/deploy_key  && chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$HOST_KEY" > ~/.ssh/known_hosts && chmod 600 ~/.ssh/known_hosts

      - name: Deploy via SSH to evergreen
        env:
          COMMIT_SHA:           ${{ github.sha }}
          GHCR_USER:            ${{ github.actor }}
          GHCR_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET:           ${{ secrets.DEV_JWT_SECRET }}
          JWT_REFRESH_SECRET:   ${{ secrets.DEV_JWT_REFRESH_SECRET }}
          SESSION_SECRET:       ${{ secrets.DEV_SESSION_SECRET }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL:  ${{ vars.GOOGLE_CALLBACK_URL }}
          LINE_CHANNEL_ID:      ${{ secrets.LINE_CHANNEL_ID }}
          LINE_CHANNEL_SECRET:  ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_CALLBACK_URL:    ${{ vars.LINE_CALLBACK_URL }}
          FRONTEND_URL:         ${{ vars.FRONTEND_URL }}
          BACKEND_URL:          ${{ vars.BACKEND_URL }}
          POSTGRES_USER:        ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD:    ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:          ${{ secrets.POSTGRES_DB }}
        run: |
          set -euo pipefail
          tar -czf /tmp/deploy.tar.gz \
            docker-compose.yml docker-compose.ghcr.yml docker-compose.staging.yml \
            nginx/nginx.conf

          jq -n \
            --arg commit_sha           "$COMMIT_SHA" \
            --arg deploy_payload_b64   "$(base64 -w0 < /tmp/deploy.tar.gz)" \
            --arg ghcr_user            "$GHCR_USER" \
            --arg ghcr_token           "$GHCR_TOKEN" \
            --arg JWT_SECRET           "$JWT_SECRET" \
            --arg JWT_REFRESH_SECRET   "$JWT_REFRESH_SECRET" \
            --arg SESSION_SECRET       "$SESSION_SECRET" \
            --arg GOOGLE_CLIENT_ID     "$GOOGLE_CLIENT_ID" \
            --arg GOOGLE_CLIENT_SECRET "$GOOGLE_CLIENT_SECRET" \
            --arg GOOGLE_CALLBACK_URL  "$GOOGLE_CALLBACK_URL" \
            --arg LINE_CHANNEL_ID      "$LINE_CHANNEL_ID" \
            --arg LINE_CHANNEL_SECRET  "$LINE_CHANNEL_SECRET" \
            --arg LINE_CALLBACK_URL    "$LINE_CALLBACK_URL" \
            --arg FRONTEND_URL         "$FRONTEND_URL" \
            --arg BACKEND_URL          "$BACKEND_URL" \
            --arg POSTGRES_USER        "$POSTGRES_USER" \
            --arg POSTGRES_PASSWORD    "$POSTGRES_PASSWORD" \
            --arg POSTGRES_DB          "$POSTGRES_DB" \
            '{
              commit_sha: $commit_sha,
              deploy_payload_b64: $deploy_payload_b64,
              ghcr: { user: $ghcr_user, token: $ghcr_token },
              env: {
                RUST_ENV:             "staging",
                NODE_ENV:             "staging",
                RUST_LOG:             "info",
                LOG_LEVEL:            "info",
                JWT_SECRET:           $JWT_SECRET,
                JWT_REFRESH_SECRET:   $JWT_REFRESH_SECRET,
                SESSION_SECRET:       $SESSION_SECRET,
                POSTGRES_USER:        $POSTGRES_USER,
                POSTGRES_PASSWORD:    $POSTGRES_PASSWORD,
                POSTGRES_DB:          $POSTGRES_DB,
                DATABASE_URL:         ("postgresql://" + $POSTGRES_USER + ":" + $POSTGRES_PASSWORD + "@postgres:5432/" + $POSTGRES_DB),
                REDIS_URL:            "redis://redis:6379",
                FRONTEND_URL:         $FRONTEND_URL,
                BACKEND_URL:          $BACKEND_URL,
                GOOGLE_CLIENT_ID:     $GOOGLE_CLIENT_ID,
                GOOGLE_CLIENT_SECRET: $GOOGLE_CLIENT_SECRET,
                GOOGLE_CALLBACK_URL:  $GOOGLE_CALLBACK_URL,
                LINE_CHANNEL_ID:      $LINE_CHANNEL_ID,
                LINE_CHANNEL_SECRET:  $LINE_CHANNEL_SECRET,
                LINE_CALLBACK_URL:    $LINE_CALLBACK_URL
              }
            }' \
          | ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o ProxyCommand="cloudflared --edge-ip-version 4 access ssh --hostname %h" \
              deploy@evergreen.thehfhotel.org

  # =============================================================================
  # VERIFY STAGING HEALTH
  #
  # Catches deploy-itself-broken cases (image won't start, migration crashes
  # at runtime, env var missing) that pre-merge tests can't see. Polls the
  # staging /api/health endpoint until it returns HTTP 200 or 90s elapses.
  # The matching environment URL is set on `deploy-staging` above.
  # =============================================================================

  verify-staging:
    name: "Verify Staging"
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Poll staging /api/health
        id: poll
        env:
          STAGING_HEALTH_URL: http://loyalty-dev.saichon.com/api/health
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if curl -fsS --max-time 5 "$STAGING_HEALTH_URL" >/dev/null; then
              echo "Staging healthy after ${attempt} attempts"
              exit 0
            fi
            sleep 3
          done
          echo "::error::Staging /api/health not responding after 90s"
          exit 1

      # The rest of this job runs only when the poll above fails, to grab
      # backend logs + container state from the staging host before the
      # next push overwrites them. Without this, every red verify-staging
      # is a black box.

      - name: Install cloudflared (on failure)
        if: failure()
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /tmp/cloudflared
          sudo install -m 755 /tmp/cloudflared /usr/local/bin/cloudflared

      - name: Install SSH key + known_hosts (on failure)
        if: failure()
        env:
          SSH_KEY:  ${{ secrets.EVERGREEN_DEPLOY_SSH_KEY }}
          HOST_KEY: ${{ secrets.EVERGREEN_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY"  > ~/.ssh/deploy_key  && chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$HOST_KEY" > ~/.ssh/known_hosts && chmod 600 ~/.ssh/known_hosts

      - name: Capture staging logs + container state (on failure)
        if: failure()
        run: |
          set -uo pipefail
          mkdir -p staging-failure-logs

          # Tolerate per-command failure: even partial output is useful when
          # the box is sick. We `|| true` each remote invocation so a missing
          # service or auth error doesn't truncate the rest.
          SSH_CMD=(ssh -i ~/.ssh/deploy_key
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile=~/.ssh/known_hosts
            -o ProxyCommand="cloudflared --edge-ip-version 4 access ssh --hostname %h"
            -o ConnectTimeout=15
            deploy@evergreen.thehfhotel.org)

          "${SSH_CMD[@]}" 'docker ps --filter "name=loyalty_" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"' \
            > staging-failure-logs/containers.txt 2>&1 || true

          "${SSH_CMD[@]}" 'docker logs --tail 200 loyalty_backend_dev 2>&1' \
            > staging-failure-logs/backend.log 2>&1 || true

          "${SSH_CMD[@]}" 'docker logs --tail 100 loyalty_postgres_dev 2>&1' \
            > staging-failure-logs/postgres.log 2>&1 || true

          "${SSH_CMD[@]}" 'docker logs --tail 100 loyalty_nginx_dev 2>&1' \
            > staging-failure-logs/nginx.log 2>&1 || true

          echo "--- containers.txt ---"
          cat staging-failure-logs/containers.txt || true
          echo "--- backend.log (tail) ---"
          tail -40 staging-failure-logs/backend.log || true

      - name: Upload failure logs as artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: staging-failure-logs-${{ github.sha }}
          path: staging-failure-logs/
          retention-days: 14

  # =============================================================================
  # NOTIFY ON STAGING HEALTHCHECK FAILURE
  #
  # Files (or comments on) a GitHub issue when the verify-staging poll fails
  # so the failure is visible somewhere a human actually reads, not just the
  # red X in the Actions tab. The cargo-audit workflow uses the same pattern;
  # see `cargo-audit.yml`. Slack / email channels can be added later via an
  # OPS_ALERT_SLACK_WEBHOOK secret without touching the verify job.
  # =============================================================================

  notify-verify-staging-failure:
    name: "Notify on Verify Staging failure"
    runs-on: ubuntu-latest
    needs: [verify-staging]
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write

    steps:
      - name: File or update verify-staging-failure issue
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="Verify Staging failed on main"
          EXISTING=$(gh issue list -R "${{ github.repository }}" \
            --search "$TITLE in:title is:open" \
            --json number --jq '.[0].number // empty')

          BODY=$(cat <<EOF
          The post-deploy \`Verify Staging\` step failed after a push to \`main\`.

          - Run: $RUN_URL
          - Commit: \`${{ github.sha }}\`
          - Author: @${{ github.actor }}

          Staging is now in an undefined state (the new image is up but
          \`/api/health\` is not responding). Investigate:
          1. Open the run log linked above for the failing curl attempts.
          2. SSH to evergreen and check container status / backend logs.
          3. Roll back via \`docs/rollback-runbook.md\` if root cause is not
             a quick fix.
          EOF
          )

          if [ -n "${EXISTING:-}" ]; then
            gh issue comment "$EXISTING" -R "${{ github.repository }}" --body "$BODY"
            echo "Updated existing issue #$EXISTING"
          else
            gh issue create -R "${{ github.repository }}" \
              --title "$TITLE" \
              --body "$BODY"
            echo "Filed new verify-staging-failure issue"
          fi
