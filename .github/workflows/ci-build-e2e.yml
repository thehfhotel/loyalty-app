name: CI Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: 'Skip E2E tests'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  packages: write

env:
  NODE_VERSION: '24'
  RUST_VERSION: '1.93'
  REGISTRY: ghcr.io
  IMAGE_OWNER: thehfhotel
  IMAGE_REPO: loyalty-app
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # =============================================================================
  # LINT BACKEND (Rust) - fail-fast fmt + clippy on bare ubuntu, separate cache
  # =============================================================================

  lint-backend:
    name: "Lint Backend (Rust)"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust dependencies (lint)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend-rust -> target"
          cache-on-failure: true
          prefix-key: "v0-rust-lint"

      - name: Check formatting
        working-directory: ./backend-rust
        run: cargo fmt --all -- --check

      - name: Run clippy (lints)
        working-directory: ./backend-rust
        run: cargo clippy --all-targets --all-features -- -D warnings

  # =============================================================================
  # VALIDATE & BUILD BACKEND (Rust)
  #
  # Single Rust toolchain pass that:
  #   1. Unit tests (debug)
  #   2. Applies migrations to a service Postgres, verifies schema
  #   3. Runs sqlx prepare --check against the live test DB
  #   4. Runs integration tests against the live DB + Redis
  #   5. Builds the release binary and uploads it as an artifact for the
  #      build-and-push job to consume.
  #
  # Runs inside rust:1.93-bookworm so the same target/ cache (Swatinem rust-cache
  # workspace key) is shared between tests and the release build. The previous
  # two-job split used different OS environments + different cache prefixes,
  # which made it impossible to share artifacts. See PR consolidating CI.
  # =============================================================================

  # Test and release-build run in parallel: dependency compilation is the
  # heavyweight phase (both share a single rust-cache via the
  # `v0-rust-container` prefix), but the workloads are independent —
  # debug-mode tests don't need the release binary, and the release binary
  # doesn't need to wait for integration tests to pass before being built.
  # `build-and-push` consumes only the binary artifact; `e2e-tests` gates on
  # both jobs so tests must pass before we burn time on the e2e suite.

  test-backend:
    name: "Test Backend (Rust)"
    runs-on: ubuntu-latest
    needs: [lint-backend]
    timeout-minutes: 30
    container:
      image: rust:1.93-bookworm

    defaults:
      run:
        shell: bash

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: loyalty_test
          POSTGRES_PASSWORD: loyalty_test_pass
          POSTGRES_DB: loyalty_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://loyalty_test:loyalty_test_pass@postgres:5432/loyalty_test_db
      TEST_DATABASE_URL: postgresql://loyalty_test:loyalty_test_pass@postgres:5432/loyalty_test_db
      TEST_REDIS_URL: redis://redis:6379
      PGPASSWORD: loyalty_test_pass

    steps:
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libpq-dev postgresql-client

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend-rust -> target"
          cache-on-failure: true
          prefix-key: "v0-rust-container"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run unit tests
        working-directory: ./backend-rust
        run: cargo nextest run --lib --bins
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug

      - name: Grant CREATEDB for per-test database isolation
        run: |
          psql -h postgres -p 5432 -U loyalty_test -d loyalty_test_db \
            -c "ALTER USER loyalty_test CREATEDB;"

      - name: Run database migrations
        run: |
          set -euo pipefail
          for f in backend-rust/migrations/*.sql; do
            echo "Applying $f"
            psql -h postgres -p 5432 -U loyalty_test -d loyalty_test_db \
              -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Verify database schema
        run: |
          TABLE_COUNT=$(psql -h postgres -p 5432 -U loyalty_test -d loyalty_test_db -t -c \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_type = 'BASE TABLE';")
          TABLE_COUNT=$(echo "$TABLE_COUNT" | tr -d ' ')
          echo "Tables created: $TABLE_COUNT"
          if [ "$TABLE_COUNT" -lt 25 ]; then
            echo "::error::Expected 25+ tables, found $TABLE_COUNT. Migration may have failed."
            psql -h postgres -p 5432 -U loyalty_test -d loyalty_test_db -c \
              "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public' AND table_type = 'BASE TABLE' ORDER BY table_name;"
            exit 1
          fi

          FUNC_COUNT=$(psql -h postgres -p 5432 -U loyalty_test -d loyalty_test_db -t -c \
            "SELECT count(*) FROM information_schema.routines WHERE routine_schema = 'public' AND routine_type = 'FUNCTION';")
          FUNC_COUNT=$(echo "$FUNC_COUNT" | tr -d ' ')
          echo "Stored procedures/functions: $FUNC_COUNT"
          if [ "$FUNC_COUNT" -lt 5 ]; then
            echo "::error::Expected 5+ stored procedures, found $FUNC_COUNT."
            exit 1
          fi

          echo "Database schema verification passed"

      - name: Seed test data
        run: |
          psql -h postgres -p 5432 -U loyalty_test -d loyalty_test_db -c "
            INSERT INTO tiers (name, min_points, min_nights, benefits, color, sort_order, is_active)
            VALUES
              ('Bronze', 0, 0, '{\"discount\": 0}', '#CD7F32', 1, true),
              ('Silver', 0, 1, '{\"discount\": 5}', '#C0C0C0', 2, true),
              ('Gold', 0, 10, '{\"discount\": 10}', '#FFD700', 3, true),
              ('Platinum', 0, 20, '{\"discount\": 15}', '#E5E4E2', 4, true)
            ON CONFLICT (name) DO NOTHING;

            INSERT INTO membership_id_sequence (id, current_user_count)
            VALUES (1, 0)
            ON CONFLICT (id) DO NOTHING;
          "
          echo "Test data seeded successfully"

      - name: Cache sqlx-cli
        id: cache-sqlx
        uses: actions/cache@v5
        with:
          # sqlx-cli installs TWO binaries; `cargo sqlx ...` invocations
          # below need `cargo-sqlx` in PATH. Caching only `sqlx` (as a prior
          # version of this step did) silently produced cache hits that
          # restored only half the install — the next run then failed with
          # "no such command: `sqlx`".
          path: |
            /usr/local/cargo/bin/sqlx
            /usr/local/cargo/bin/cargo-sqlx
          key: sqlx-cli-container-${{ env.RUST_VERSION }}-v2

      - name: Install sqlx-cli
        if: steps.cache-sqlx.outputs.cache-hit != 'true'
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Verify SQLx query cache
        working-directory: ./backend-rust
        run: cargo sqlx prepare --check

      - name: Run integration tests
        working-directory: ./backend-rust
        run: cargo nextest run --test '*'
        env:
          RUST_BACKTRACE: short
          RUST_LOG: warn
          JWT_SECRET: test-jwt-secret-key-for-testing-only-minimum-32-chars
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-testing-only-minimum-32-chars
          SESSION_SECRET: test-session-secret-key-for-testing-only-minimum-32-chars
          GOOGLE_CLIENT_ID: test-google-client-id
          GOOGLE_CLIENT_SECRET: test-google-client-secret
          GOOGLE_CALLBACK_URL: http://localhost:4001/api/oauth/google/callback
          LINE_CLIENT_ID: test-line-channel-id
          LINE_CLIENT_SECRET: test-line-channel-secret
          LINE_CALLBACK_URL: http://localhost:4001/api/oauth/line/callback
          FRONTEND_URL: http://localhost:3000

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Check for security vulnerabilities
        working-directory: ./backend-rust
        run: cargo audit || echo "Some vulnerabilities found - review output"
        continue-on-error: true

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  build-backend-release:
    name: "Build Backend Release"
    runs-on: ubuntu-latest
    needs: [lint-backend]
    timeout-minutes: 25
    container:
      image: rust:1.93-bookworm

    defaults:
      run:
        shell: bash

    steps:
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libpq-dev

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend-rust -> target"
          cache-on-failure: true
          prefix-key: "v0-rust-container"

      - name: Build release binary
        working-directory: ./backend-rust
        run: cargo build --release --bin loyalty-backend

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: loyalty-backend-binary
          path: backend-rust/target/release/loyalty-backend
          retention-days: 1

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  # =============================================================================
  # BUILD AND PUSH DOCKER IMAGES TO GHCR
  # =============================================================================

  build-and-push:
    name: "Build & Push to GHCR"
    runs-on: ubuntu-latest
    # Only the binary artifact is required; release build runs in parallel
    # with test-backend, so build-and-push can start as soon as the binary
    # is ready without waiting for the test suite.
    needs: [build-backend-release]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      image-tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------------------------
      # Backend Image (Rust) - uses pre-built binary from build-backend-release
      # -------------------------------------------------------------------------
      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: loyalty-backend-binary
          path: ./backend-binary

      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/backend
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend-binary
          file: ./backend-rust/Dockerfile.ci
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend-ci
          cache-to: type=gha,mode=max,scope=backend-ci
          platforms: linux/amd64

      # -------------------------------------------------------------------------
      # Frontend Image
      # -------------------------------------------------------------------------
      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/frontend
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'https://loyalty.saichon.com/api' }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          platforms: linux/amd64

      - name: Summary
        run: |
          echo "## Docker Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backend (Rust)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta-backend.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Frontend" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta-frontend.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # E2E TESTS (using GHCR images)
  # =============================================================================

  e2e-tests:
    name: "E2E Tests"
    runs-on: ubuntu-latest
    # Wait for test-backend so we don't burn 2+ minutes of e2e runtime
    # against a backend whose unit/integration tests are red.
    needs: [build-and-push, test-backend]
    if: github.event.inputs.skip_e2e != 'true'
    timeout-minutes: 20
    # E2E tests run sequentially to prevent port conflicts
    concurrency:
      group: e2e-tests
      cancel-in-progress: false

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: loyalty_e2e
          POSTGRES_PASSWORD: loyalty_e2e_pass
          POSTGRES_DB: loyalty_e2e_db
        ports:
          - 5436:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          # Read the resolved version from package-lock.json (semver-pinned),
          # not the ^-prefixed range in package.json, so the cache key changes
          # only when the lockfile changes.
          PLAYWRIGHT_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "version=$PLAYWRIGHT_VERSION" >> $GITHUB_OUTPUT
          echo "Playwright version: $PLAYWRIGHT_VERSION"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers (with system deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cache hit, browsers already present)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull backend image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/backend:${{ github.sha }}

      - name: Pull frontend image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/frontend:${{ github.sha }}

      - name: Start backend container
        run: |
          docker run -d --name backend --network host \
            -e RUST_ENV=development \
            -e NODE_ENV=development \
            -e PORT=4202 \
            -e DATABASE_URL=postgresql://loyalty_e2e:loyalty_e2e_pass@localhost:5436/loyalty_e2e_db \
            -e REDIS_URL=redis://localhost:6381 \
            -e JWT_SECRET=e2e-jwt-secret-for-testing-minimum-64-characters-long-secure-token-string \
            -e JWT_REFRESH_SECRET=e2e-jwt-refresh-secret-for-testing-minimum-64-characters-long-string \
            -e SESSION_SECRET=e2e-session-secret-for-testing-minimum-64-characters-long-secure-string \
            -e GOOGLE_CLIENT_ID=e2e-google-client-id \
            -e GOOGLE_CLIENT_SECRET=e2e-google-client-secret \
            -e GOOGLE_CALLBACK_URL=http://localhost:4202/api/oauth/google/callback \
            -e LINE_CLIENT_ID=e2e-line-channel-id \
            -e LINE_CLIENT_SECRET=e2e-line-channel-secret \
            -e LINE_CALLBACK_URL=http://localhost:4202/api/oauth/line/callback \
            -e FRONTEND_URL=http://localhost:3201 \
            -e RUST_LOG=info \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/backend:${{ github.sha }}

      - name: Start frontend container
        run: |
          docker run -d --name frontend \
            --add-host=host.docker.internal:host-gateway \
            -v ${{ github.workspace }}/frontend/nginx.e2e.conf:/etc/nginx/nginx.conf:ro \
            -p 3201:80 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/frontend:${{ github.sha }}

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -sf http://localhost:4202/api/health > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Backend failed to start"
              docker logs backend
              exit 1
            fi
            sleep 2
          done

          echo "Waiting for frontend..."
          for i in {1..30}; do
            if curl -sf http://localhost:3201 > /dev/null 2>&1; then
              echo "Frontend is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Frontend failed to start"
              docker logs frontend
              exit 1
            fi
            sleep 2
          done

      - name: Seed E2E test users
        run: |
          echo "Creating E2E test users..."
          # Create test user 1
          curl -sf -X POST http://localhost:4202/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"e2e-browser@test.com","password":"E2ETestPassword123!","firstName":"E2E","lastName":"Browser"}' \
            && echo "Created e2e-browser@test.com" \
            || echo "User may already exist"

          # Create test user 2
          curl -sf -X POST http://localhost:4202/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"e2e-browser-2@test.com","password":"E2ETestPassword123!","firstName":"E2E","lastName":"Browser2"}' \
            && echo "Created e2e-browser-2@test.com" \
            || echo "User may already exist"

          # Create admin test user (email is in admins.e2e.json)
          curl -sf -X POST http://localhost:4202/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"e2e-admin@test.local","password":"AdminPassword123!","firstName":"E2E","lastName":"Admin"}' \
            && echo "Created e2e-admin@test.local" \
            || echo "User may already exist"

          echo "E2E test users seeded"

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:3201
          E2E_API_URL: http://localhost:4202/api

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Cleanup containers
        if: always()
        run: |
          docker stop backend frontend 2>/dev/null || true
          docker rm backend frontend 2>/dev/null || true

  # =============================================================================
  # WAIT FOR CI Tests WORKFLOW (frontend jobs) BEFORE STAGING DEPLOY
  #
  # ci-test.yml runs the frontend lint and unit-test jobs for the same commit.
  # We poll the gh API instead of using workflow_run (which adds 30-120s of
  # orchestration latency and has a documented "skipped" race when two
  # upstream workflows complete out of order).
  # =============================================================================

  wait-for-frontend-checks:
    name: "Wait for Frontend Checks"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15

    steps:
      - name: Poll ci-test.yml for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Polling ci-test.yml for commit $COMMIT_SHA"

          # Poll for up to ~12 minutes (72 attempts x 10s). Fail closed if the
          # frontend checks haven't succeeded by then.
          for attempt in $(seq 1 72); do
            CONCLUSION=$(gh run list -R ${{ github.repository }} \
              --workflow=ci-test.yml --branch=main --commit="$COMMIT_SHA" \
              --json conclusion,status --jq '.[0] | "\(.status):\(.conclusion // "pending")"')

            echo "Attempt $attempt: ci-test.yml = ${CONCLUSION:-no-run-yet}"

            case "$CONCLUSION" in
              completed:success)
                echo "ci-test.yml completed successfully"
                exit 0
                ;;
              completed:failure|completed:cancelled|completed:timed_out|completed:action_required|completed:startup_failure)
                echo "::error::ci-test.yml did not succeed (status=$CONCLUSION) — aborting staging deploy"
                exit 1
                ;;
              *)
                sleep 10
                ;;
            esac
          done

          echo "::error::Timed out waiting for ci-test.yml to complete for $COMMIT_SHA"
          exit 1

  # =============================================================================
  # DEPLOY TO STAGING (no approval needed)
  #
  # Inlined here so the deploy starts the moment its prerequisites are green,
  # instead of going through a workflow_run hop that adds 30-120s of latency
  # and can race itself into "skipped" purgatory when two upstream workflows
  # finish in the wrong order.
  # =============================================================================

  deploy-staging:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    needs: [test-backend, build-and-push, e2e-tests, wait-for-frontend-checks]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10
    environment:
      name: development
      url: http://loyalty-dev.saichon.com

    steps:
      - name: Checkout config files
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.yml
            docker-compose.ghcr.yml
            docker-compose.staging.yml
            nginx/nginx.conf
          sparse-checkout-cone-mode: false

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /tmp/cloudflared
          sudo install -m 755 /tmp/cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Install SSH key + known_hosts
        env:
          SSH_KEY:  ${{ secrets.EVERGREEN_DEPLOY_SSH_KEY }}
          HOST_KEY: ${{ secrets.EVERGREEN_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY"  > ~/.ssh/deploy_key  && chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$HOST_KEY" > ~/.ssh/known_hosts && chmod 600 ~/.ssh/known_hosts

      - name: Deploy via SSH to evergreen
        env:
          COMMIT_SHA:           ${{ github.sha }}
          GHCR_USER:            ${{ github.actor }}
          GHCR_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET:           ${{ secrets.DEV_JWT_SECRET }}
          JWT_REFRESH_SECRET:   ${{ secrets.DEV_JWT_REFRESH_SECRET }}
          SESSION_SECRET:       ${{ secrets.DEV_SESSION_SECRET }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL:  ${{ vars.GOOGLE_CALLBACK_URL }}
          LINE_CHANNEL_ID:      ${{ secrets.LINE_CHANNEL_ID }}
          LINE_CHANNEL_SECRET:  ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_CALLBACK_URL:    ${{ vars.LINE_CALLBACK_URL }}
          FRONTEND_URL:         ${{ vars.FRONTEND_URL }}
          BACKEND_URL:          ${{ vars.BACKEND_URL }}
          POSTGRES_USER:        ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD:    ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:          ${{ secrets.POSTGRES_DB }}
        run: |
          set -euo pipefail
          tar -czf /tmp/deploy.tar.gz \
            docker-compose.yml docker-compose.ghcr.yml docker-compose.staging.yml \
            nginx/nginx.conf

          jq -n \
            --arg commit_sha           "$COMMIT_SHA" \
            --arg deploy_payload_b64   "$(base64 -w0 < /tmp/deploy.tar.gz)" \
            --arg ghcr_user            "$GHCR_USER" \
            --arg ghcr_token           "$GHCR_TOKEN" \
            --arg JWT_SECRET           "$JWT_SECRET" \
            --arg JWT_REFRESH_SECRET   "$JWT_REFRESH_SECRET" \
            --arg SESSION_SECRET       "$SESSION_SECRET" \
            --arg GOOGLE_CLIENT_ID     "$GOOGLE_CLIENT_ID" \
            --arg GOOGLE_CLIENT_SECRET "$GOOGLE_CLIENT_SECRET" \
            --arg GOOGLE_CALLBACK_URL  "$GOOGLE_CALLBACK_URL" \
            --arg LINE_CHANNEL_ID      "$LINE_CHANNEL_ID" \
            --arg LINE_CHANNEL_SECRET  "$LINE_CHANNEL_SECRET" \
            --arg LINE_CALLBACK_URL    "$LINE_CALLBACK_URL" \
            --arg FRONTEND_URL         "$FRONTEND_URL" \
            --arg BACKEND_URL          "$BACKEND_URL" \
            --arg POSTGRES_USER        "$POSTGRES_USER" \
            --arg POSTGRES_PASSWORD    "$POSTGRES_PASSWORD" \
            --arg POSTGRES_DB          "$POSTGRES_DB" \
            '{
              commit_sha: $commit_sha,
              deploy_payload_b64: $deploy_payload_b64,
              ghcr: { user: $ghcr_user, token: $ghcr_token },
              env: {
                RUST_ENV:             "staging",
                NODE_ENV:             "staging",
                RUST_LOG:             "info",
                LOG_LEVEL:            "info",
                JWT_SECRET:           $JWT_SECRET,
                JWT_REFRESH_SECRET:   $JWT_REFRESH_SECRET,
                SESSION_SECRET:       $SESSION_SECRET,
                POSTGRES_USER:        $POSTGRES_USER,
                POSTGRES_PASSWORD:    $POSTGRES_PASSWORD,
                POSTGRES_DB:          $POSTGRES_DB,
                DATABASE_URL:         ("postgresql://" + $POSTGRES_USER + ":" + $POSTGRES_PASSWORD + "@postgres:5432/" + $POSTGRES_DB),
                REDIS_URL:            "redis://redis:6379",
                FRONTEND_URL:         $FRONTEND_URL,
                BACKEND_URL:          $BACKEND_URL,
                GOOGLE_CLIENT_ID:     $GOOGLE_CLIENT_ID,
                GOOGLE_CLIENT_SECRET: $GOOGLE_CLIENT_SECRET,
                GOOGLE_CALLBACK_URL:  $GOOGLE_CALLBACK_URL,
                LINE_CHANNEL_ID:      $LINE_CHANNEL_ID,
                LINE_CHANNEL_SECRET:  $LINE_CHANNEL_SECRET,
                LINE_CALLBACK_URL:    $LINE_CALLBACK_URL
              }
            }' \
          | ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o ProxyCommand="cloudflared --edge-ip-version 4 access ssh --hostname %h" \
              deploy@evergreen.thehfhotel.org
