name: Deploy

on:
  workflow_run:
    workflows: ["CI Tests", "CI Build & Deploy"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  packages: read
  # Needed by `notify-on-failure` so a red prod deploy surfaces as a
  # GitHub issue. The Actions tab is not a paging channel.
  issues: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: thehfhotel
  IMAGE_REPO: loyalty-app
  # Pin cloudflared so the cache key is stable across deploys. Bump this
  # version (and the cache will repopulate on the next run) when the
  # cloudflared release we want changes.
  CLOUDFLARED_VERSION: "2024.10.0"

jobs:
  # =============================================================================
  # CHECK THAT BOTH CI WORKFLOWS PASSED FOR THIS COMMIT
  #
  # Staging deploy moved into ci-build-e2e.yml (no workflow_run hop needed) —
  # this workflow now exists solely to gate the manual-approval production
  # deploy on both CI workflows succeeding for the same commit.
  # =============================================================================

  check-prerequisites:
    name: "Check Prerequisites"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-deploy: ${{ steps.check.outputs.ready }}
      commit-sha: ${{ steps.check.outputs.sha }}

    steps:
      - name: Check all workflows passed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=${{ github.event.workflow_run.head_sha }}
          echo "Checking workflow status for commit: $SHA"
          echo "sha=$SHA" >> $GITHUB_OUTPUT

          # Check CI Tests workflow
          TEST_STATUS=$(gh run list -R ${{ github.repository }} \
            --workflow=ci-test.yml --branch=main --commit=$SHA \
            --json conclusion --jq '.[0].conclusion // "pending"')
          echo "CI Tests status: $TEST_STATUS"

          # Check CI Build & Deploy workflow
          BUILD_STATUS=$(gh run list -R ${{ github.repository }} \
            --workflow=ci-build-e2e.yml --branch=main --commit=$SHA \
            --json conclusion --jq '.[0].conclusion // "pending"')
          echo "CI Build & Deploy status: $BUILD_STATUS"

          if [ "$TEST_STATUS" = "success" ] && [ "$BUILD_STATUS" = "success" ]; then
            echo "Both workflows passed - proceeding with deployment"
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "Not all workflows have passed yet (test=$TEST_STATUS, build=$BUILD_STATUS)"
            echo "ready=false" >> $GITHUB_OUTPUT
          fi

  # =============================================================================
  # DEPLOY TO PRODUCTION (requires approval)
  # =============================================================================

  deploy-production:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: [check-prerequisites]
    if: needs.check-prerequisites.outputs.should-deploy == 'true'
    timeout-minutes: 10
    environment:
      name: production
      url: https://loyalty.saichon.com

    steps:
      - name: Checkout config files
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-prerequisites.outputs.commit-sha }}
          sparse-checkout: |
            docker-compose.yml
            docker-compose.ghcr.yml
            docker-compose.prod.yml
            nginx/nginx.conf
          sparse-checkout-cone-mode: false

      - name: Cache cloudflared binary
        id: cache-cloudflared
        uses: actions/cache@v5
        with:
          path: ~/.cache/cloudflared
          key: cloudflared-${{ runner.os }}-${{ env.CLOUDFLARED_VERSION }}

      - name: Download cloudflared (cache miss)
        if: steps.cache-cloudflared.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/cloudflared
          curl -fsSL \
            "https://github.com/cloudflare/cloudflared/releases/download/${CLOUDFLARED_VERSION}/cloudflared-linux-amd64" \
            -o ~/.cache/cloudflared/cloudflared
          chmod +x ~/.cache/cloudflared/cloudflared

      - name: Install cloudflared to /usr/local/bin
        run: |
          sudo install -m 755 ~/.cache/cloudflared/cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Install SSH key + known_hosts
        env:
          SSH_KEY:  ${{ secrets.EVERGREEN_DEPLOY_SSH_KEY }}
          HOST_KEY: ${{ secrets.EVERGREEN_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY"  > ~/.ssh/deploy_key  && chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$HOST_KEY" > ~/.ssh/known_hosts && chmod 600 ~/.ssh/known_hosts

      - name: Deploy via SSH to evergreen
        env:
          COMMIT_SHA:           ${{ needs.check-prerequisites.outputs.commit-sha }}
          GHCR_USER:            ${{ github.actor }}
          GHCR_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET:           ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET:   ${{ secrets.JWT_REFRESH_SECRET }}
          SESSION_SECRET:       ${{ secrets.SESSION_SECRET }}
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          POSTGRES_USER:        ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD:    ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:          ${{ secrets.POSTGRES_DB }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL:  ${{ vars.GOOGLE_CALLBACK_URL }}
          LINE_CHANNEL_ID:      ${{ secrets.LINE_CHANNEL_ID }}
          LINE_CHANNEL_SECRET:  ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_CALLBACK_URL:    ${{ vars.LINE_CALLBACK_URL }}
          FRONTEND_URL:         ${{ vars.FRONTEND_URL }}
          BACKEND_URL:          ${{ vars.BACKEND_URL }}
          SMTP_HOST:            ${{ secrets.SMTP_HOST }}
          SMTP_PORT:            ${{ secrets.SMTP_PORT }}
          SMTP_USER:            ${{ secrets.SMTP_USER }}
          SMTP_PASS:            ${{ secrets.SMTP_PASS }}
          IMAP_HOST:            ${{ secrets.IMAP_HOST }}
          IMAP_PORT:            ${{ secrets.IMAP_PORT }}
          IMAP_USER:            ${{ secrets.IMAP_USER }}
          IMAP_PASS:            ${{ secrets.IMAP_PASS }}
        run: |
          set -euo pipefail
          tar -czf /tmp/deploy.tar.gz \
            docker-compose.yml docker-compose.ghcr.yml docker-compose.prod.yml \
            nginx/nginx.conf

          jq -n \
            --arg commit_sha           "$COMMIT_SHA" \
            --arg deploy_payload_b64   "$(base64 -w0 < /tmp/deploy.tar.gz)" \
            --arg ghcr_user            "$GHCR_USER" \
            --arg ghcr_token           "$GHCR_TOKEN" \
            --arg JWT_SECRET           "$JWT_SECRET" \
            --arg JWT_REFRESH_SECRET   "$JWT_REFRESH_SECRET" \
            --arg SESSION_SECRET       "$SESSION_SECRET" \
            --arg DATABASE_URL         "$DATABASE_URL" \
            --arg POSTGRES_USER        "$POSTGRES_USER" \
            --arg POSTGRES_PASSWORD    "$POSTGRES_PASSWORD" \
            --arg POSTGRES_DB          "$POSTGRES_DB" \
            --arg GOOGLE_CLIENT_ID     "$GOOGLE_CLIENT_ID" \
            --arg GOOGLE_CLIENT_SECRET "$GOOGLE_CLIENT_SECRET" \
            --arg GOOGLE_CALLBACK_URL  "$GOOGLE_CALLBACK_URL" \
            --arg LINE_CHANNEL_ID      "$LINE_CHANNEL_ID" \
            --arg LINE_CHANNEL_SECRET  "$LINE_CHANNEL_SECRET" \
            --arg LINE_CALLBACK_URL    "$LINE_CALLBACK_URL" \
            --arg FRONTEND_URL         "$FRONTEND_URL" \
            --arg BACKEND_URL          "$BACKEND_URL" \
            --arg SMTP_HOST            "${SMTP_HOST:-}" \
            --arg SMTP_PORT            "${SMTP_PORT:-587}" \
            --arg SMTP_USER            "${SMTP_USER:-}" \
            --arg SMTP_PASS            "${SMTP_PASS:-}" \
            --arg IMAP_HOST            "${IMAP_HOST:-}" \
            --arg IMAP_PORT            "${IMAP_PORT:-993}" \
            --arg IMAP_USER            "${IMAP_USER:-}" \
            --arg IMAP_PASS            "${IMAP_PASS:-}" \
            '{
              commit_sha: $commit_sha,
              deploy_payload_b64: $deploy_payload_b64,
              ghcr: { user: $ghcr_user, token: $ghcr_token },
              env: {
                RUST_ENV:             "production",
                NODE_ENV:             "production",
                RUST_LOG:             "info",
                LOG_LEVEL:            "info",
                JWT_SECRET:           $JWT_SECRET,
                JWT_REFRESH_SECRET:   $JWT_REFRESH_SECRET,
                SESSION_SECRET:       $SESSION_SECRET,
                POSTGRES_USER:        $POSTGRES_USER,
                POSTGRES_PASSWORD:    $POSTGRES_PASSWORD,
                POSTGRES_DB:          $POSTGRES_DB,
                DATABASE_URL:         $DATABASE_URL,
                REDIS_URL:            "redis://redis:6379",
                FRONTEND_URL:         $FRONTEND_URL,
                BACKEND_URL:          $BACKEND_URL,
                GOOGLE_CLIENT_ID:     $GOOGLE_CLIENT_ID,
                GOOGLE_CLIENT_SECRET: $GOOGLE_CLIENT_SECRET,
                GOOGLE_CALLBACK_URL:  $GOOGLE_CALLBACK_URL,
                LINE_CHANNEL_ID:      $LINE_CHANNEL_ID,
                LINE_CHANNEL_SECRET:  $LINE_CHANNEL_SECRET,
                LINE_CALLBACK_URL:    $LINE_CALLBACK_URL,
                SMTP_HOST:            $SMTP_HOST,
                SMTP_PORT:            $SMTP_PORT,
                SMTP_USER:            $SMTP_USER,
                SMTP_PASS:            $SMTP_PASS,
                IMAP_HOST:            $IMAP_HOST,
                IMAP_PORT:            $IMAP_PORT,
                IMAP_USER:            $IMAP_USER,
                IMAP_PASS:            $IMAP_PASS
              }
            }' \
          | ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o ProxyCommand="cloudflared --edge-ip-version 4 access ssh --hostname %h" \
              deploy@evergreen.thehfhotel.org

      - name: Deployment Summary
        run: |
          echo "## Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ needs.check-prerequisites.outputs.commit-sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: \`${{ needs.check-prerequisites.outputs.commit-sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://loyalty.saichon.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: Rust (loyalty-backend)" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # NOTIFY ON PRODUCTION DEPLOY FAILURE
  #
  # Files (or comments on) a GitHub issue if the prod deploy job fails so the
  # operator who approved the deploy isn't the only person with the failure
  # signal. Slack / email channels can be added later by adding a step here
  # that consumes an `OPS_ALERT_SLACK_WEBHOOK` secret — no other change.
  # =============================================================================

  notify-on-failure:
    name: "Notify on production deploy failure"
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: failure()
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: File or update prod-deploy-failure issue
        env:
          GH_TOKEN:   ${{ github.token }}
          RUN_URL:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ needs.check-prerequisites.outputs.commit-sha }}
        run: |
          set -euo pipefail
          TITLE="Production deploy failed"
          EXISTING=$(gh issue list -R "${{ github.repository }}" \
            --search "$TITLE in:title is:open" \
            --json number --jq '.[0].number // empty')

          BODY=$(cat <<EOF
          The production deploy job failed.

          - Run: $RUN_URL
          - Commit: \`$COMMIT_SHA\`
          - Approver: @${{ github.actor }}

          Production is now in an undefined state. See
          \`docs/rollback-runbook.md\` for the redeploy-previous-SHA path.
          EOF
          )

          if [ -n "${EXISTING:-}" ]; then
            gh issue comment "$EXISTING" -R "${{ github.repository }}" --body "$BODY"
          else
            gh issue create -R "${{ github.repository }}" \
              --title "$TITLE" \
              --body "$BODY"
          fi
