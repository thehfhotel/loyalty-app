name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.actor == 'dependabot[bot]' && 'dependabot-ci-test' || format('ci-test-{0}', github.ref) }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  pull-requests: read

env:
  NODE_VERSION: '24'

jobs:
  # =============================================================================
  # WORKSPACE PREPARATION (Node.js only)
  #
  # Backend (Rust) validation, lint, and build have moved to ci-build-e2e.yml so
  # that the single Rust toolchain pass produces the release binary directly,
  # sharing one target/ cache with build & deploy. See PR consolidating CI.
  # =============================================================================

  prepare:
    name: "Prepare Workspace"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      frontend-cache-key: ${{ steps.cache-keys.outputs.frontend }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate cache keys
        id: cache-keys
        run: |
          echo "frontend=frontend-deps-${{ hashFiles('frontend/package-lock.json') }}" >> $GITHUB_OUTPUT

      - name: Cache frontend dependencies
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ steps.cache-keys.outputs.frontend }}
          restore-keys: |
            frontend-deps-

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

  # =============================================================================
  # FRONTEND VALIDATION & TESTING
  # =============================================================================

  lint-frontend:
    name: "Lint Frontend"
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore frontend dependencies
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ needs.prepare.outputs.frontend-cache-key }}
          fail-on-cache-miss: true

      - name: TypeScript check
        working-directory: ./frontend
        run: npm run typecheck

      - name: ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=moderate
        continue-on-error: true

  test-frontend-unit:
    name: "Frontend Unit Tests"
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore frontend dependencies
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ needs.prepare.outputs.frontend-cache-key }}
          fail-on-cache-miss: true

      - name: Run unit tests
        working-directory: ./frontend
        run: npm run test
        env:
          NODE_ENV: test
          CI: true
