events {
    worker_connections 1024;
}

http {
    # MIME types configuration for proper favicon serving
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Allow file uploads up to 15MB
    client_max_body_size 15M;

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:4001;
    }

    # ==========================================================================
    # MAIN APPLICATION SERVER
    # ==========================================================================
    # NOTE: server_name is set to 'localhost' by design for Cloudflare proxy setup
    # Cloudflare proxies requests to the origin server without changing the Host header
    # Using localhost allows the application to work both:
    #   - Directly via localhost (development/testing)
    #   - Through Cloudflare tunnel (production with custom domain)
    # If you need a specific server_name, configure it via environment variable
    # templating in your deployment pipeline
    # ==========================================================================
    server {
        listen 80;
        server_name localhost;

        # Security headers (applied to all responses, including errors, via `always`)
        # CSP starts permissive enough for the SPA to render — tune if console errors fire.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https:; font-src 'self' data:; frame-ancestors 'none';" always;

        # Favicon specific handling
        location = /favicon.ico {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Content-Type image/x-icon;
            add_header Cache-Control "public, max-age=86400";
            
            # Log favicon requests for debugging
            access_log /var/log/nginx/favicon.log;
        }

        # Static assets optimization for PWA icons and other assets
        # No CORS headers — the SPA serves itself, no legitimate cross-origin use case.
        location ~* \.(png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            # Cache static assets for better performance
            proxy_cache_valid 200 1d;
            proxy_cache_bypass $http_cache_control;
            add_header Cache-Control "public, max-age=86400";
        }

        # Manifest and service worker
        location ~* \.(json|js)$ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            
            # Short cache for dynamic JSON files
            add_header Cache-Control "public, max-age=3600";
        }

        # Frontend (catch-all for React Router)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Storage files (avatars, uploads) served from backend
        # Use ^~ to prevent regex locations from overriding this
        location ^~ /storage {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header X-Real-IP $remote_addr;
            # REPLACE the chain instead of appending. `$proxy_add_x_forwarded_for`
            # would prepend whatever the client sent into the header, letting an
            # attacker spoof the leftmost IP. The backend's rate limiter reads
            # the actual TCP peer (ConnectInfo) anyway, but anything else that
            # consumes this header should see only the trusted upstream IP.
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache uploaded files
            add_header Cache-Control "public, max-age=86400";
        }

        # Backend API
        location /api {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header X-Real-IP $remote_addr;
            # REPLACE the chain instead of appending — see the /storage block
            # above for the rationale. nginx is the only legitimate proxy in
            # front of the backend; any client-supplied X-Forwarded-For value
            # is dropped here so downstream consumers can't be misled.
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support for Vite HMR
        location /_vite_hmr {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}